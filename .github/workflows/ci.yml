name: SRE Pipeline CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compilar la imagen de Docker
      run: |
        docker build -t mi-app-sre:${{ github.sha }} .
        echo "¡Imagen compilada con éxito para el commit ${{ github.sha }}!"